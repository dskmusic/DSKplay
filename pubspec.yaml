name: musify
description: DSK Play - Music Streaming app made in Flutter!

publish_to: 'none'
version: 1.8.0+8 # run update.sh after changing the version

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: ^3.44.6

dependencies:
  app_links: ^7.2.1
  audio_service: ^0.18.19
  audio_session: ^0.2.4
  audiotags: ^1.3.2
  cached_network_image: ^3.4.1
  dynamic_color: ^1.8.1
  ffmpeg_kit_flutter_new: ^4.5.1
  file_picker: ^11.0.2
  fluentui_system_icons: ^1.1.273
  flutter:
    sdk: flutter
  flutter_flip_card: ^0.0.6
  flutter_localizations:
    sdk: flutter
  go_router: ^17.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  html: ^0.15.6
  http: ^1.6.0
  intl: ^0.20.2
  just_audio: ^0.10.6
  open_filex: ^4.5.0
  package_info_plus: ^8.3.0
  path_provider: ^2.1.6
  pdf: ^3.11.1
  permission_handler: ^12.0.3
  receive_sharing_intent:
    path: ./packages/receive_sharing_intent
  rxdart: ^0.28.0
  share_plus: ^12.0.2
  url_launcher: ^6.3.2
  wakelock_plus: ^1.3.2
  youtube_explode_dart:
    path: ./packages/youtube_explode_dart
  youtube_music_explode_dart:
    path: ./packages/youtube_music_explode_dart

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

  # flutter_lints: ^2.0.0

flutter:
  generate: true
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/licenses/
    - assets/logo.png

  fonts:
    - family: paytoneOne
      fonts:
        - asset: assets/fonts/paytone/PaytoneOne-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#14141A"
  adaptive_icon_foreground: "assets/logo.png"
  min_sdk_android: 24
